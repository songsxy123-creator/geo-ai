  <script>
    const DATA = JSON.parse(document.getElementById('dashboard-data').textContent);
    const $ = (id) => document.getElementById(id);
    const pct = (v) => `${Number(v || 0).toFixed(1)}%`;
    const yesTag = (v, label) => `<span class="tag ${v === '是' ? 'yes' : 'no'}">${label}:${v || '否'}</span>`;
    let quick = 'all';

    function uniqueValues(key) {

    }
    function fillSelect(id, label, values) {
      $(id).innerHTML = `<option value="">${label}</option>` + values.map(v => `<option>${escapeHtml(v)}</option>`).join('');
    }
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));

    function passQuick(r) {
      if (quick === 'notVisible') return r['是否提及丽兹行相关信息'] !== '是';

      if (quick === 'review') return r['是否需要人工复核'] === '是';

      const city = $('city').value;
      const platform = $('platform').value;
      const type = $('type').value;
      const issue = $('issue').value;
      const date = $('date').value;
      return DATA.details.filter(r => {
        const hay = Object.values(r).join(' ').toLowerCase();
        return (!q || hay.includes(q))
          && (!date || r['检核日期'] === date)
          && (!city || r['城市'] === city)
          && (!platform || r['AI平台'] === platform)
          && (!type || r['问题类型'] === type)
          && (!issue || r['问题归因'] === issue)
          && passQuick(r);
      });
    }

        return { name, total, visible: rate('是否提及丽兹行相关信息'), recommended: rate('是否推荐丽兹行'), top3: rate('是否进入Top3推荐'), first: rate('是否首推丽兹行'), agent: rate('是否提及丽兹行经纪人/豪宅顾问/具体经纪人'), officialContact: rate('是否出现官方标准入口'), effectiveContact: rate('是否出现有效联系方式') };

        ['经纪人', pct(s.agent), '顾问/经纪人提及'],
        ['官方入口', pct(s.officialContact), '官网/标准400等'],
        ['有效联系方式', pct(s.effectiveContact), '含400转接/顾问页等'],
      ];
      $('cards').innerHTML = cards.map(([label, value, sub]) => `<div class="card"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub}</div></div>`).join('');
    }
    function barList(el, rows, metric='recommended') {
      if (!rows.length) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
      el.innerHTML = rows.map(r => `<div class="bar-row"><div class="bar-label">${escapeHtml(r.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(0, Math.min(100, r[metric] || 0))}%"></div></div><div class="bar-value">${pct(r[metric])}</div></div>`).join('');
    }
    function countBars(el, rows) {
      const max = Math.max(1, ...rows.map(r => r.count || r['出现次数'] || 0));
      el.innerHTML = rows.map(r => {
        const name = r.name || r['来源'];
        const count = r.count || Number(r['出现次数']) || 0;
        return `<div class="bar-row"><div class="bar-label">${escapeHtml(name)}</div><div class="bar-track"><div class="bar-fill" style="width:${count / max * 100}%"></div></div><div class="bar-value">${count}</div></div>`;
      }).join('');
    }
    function renderActions(rows) {
      const weak = DATA.actions.filter(a => rows.some(r => r['检核日期'] === a['检核日期'] && r['AI平台'] === a['平台'] && r['城市'] === a['城市'] && r['楼盘/商圈'] === a['关键词/楼盘/商圈']));
      const sample = weak.slice(0, 12);
      if (!sample.length) { $('actionTable').innerHTML = '<div class="empty">当前筛选下暂无优化动作</div>'; return; }
      $('actionTable').innerHTML = `<table><thead><tr><th>城市</th><th>关键词</th><th>当前问题</th><th>发什么内容</th><th>发到哪里</th><th>优先级</th></tr></thead><tbody>${sample.map(a => `<tr><td>${escapeHtml(a['城市'])}</td><td>${escapeHtml(a['关键词/楼盘/商圈'])}</td><td><span class="tag warn">${escapeHtml(a['当前问题'])}</span></td><td>${escapeHtml(a['发布内容'])}</td><td>${escapeHtml(a['发布平台'])}</td><td><span class="tag ${a['优先级']==='S'?'warn':''}">${escapeHtml(a['优先级'])}</span></td></tr>`).join('')}</tbody></table>`;
    }
    function renderDetails(rows) {
      if (!rows.length) { $('detailRows').innerHTML = `<tr><td colspan="7" class="empty">暂无符合筛选的数据</td></tr>`; return; }
      $('detailRows').innerHTML = rows.map((r, i) => `<tr>
        <td>${escapeHtml(r['AI平台'])}</td>
        <td>${escapeHtml(r['城市'])}</td>
        <td>${escapeHtml(r['楼盘/商圈'])}</td>
        <td>${escapeHtml(r['问题原文'])}<div class="answer">${escapeHtml(r['AI回答原文'])}</div></td>
        <td>${yesTag(r['是否提及丽兹行相关信息'],'可见')}${yesTag(r['是否推荐丽兹行'],'推荐')}${yesTag(r['是否出现有效联系方式'],'联系')}</td>
        <td><span class="tag warn">${escapeHtml(r['问题归因'])}</span></td>
        <td><span class="linkish" onclick="toggleRow(this)">展开</span></td>
      </tr>`).join('');
    }
    function toggleRow(el) {
      const tr = el.closest('tr');
      tr.classList.toggle('open');
      el.textContent = tr.classList.contains('open') ? '收起' : '展开';
    }
    function render() {
      const rows = filtered();
      renderCards(rows);
      barList($('cityBars'), summarize(rows, '城市').sort((a,b)=>b.recommended-a.recommended), 'recommended');
      barList($('platformBars'), summarize(rows, 'AI平台').sort((a,b)=>b.recommended-a.recommended), 'recommended');
      const issues = Object.entries(rows.reduce((acc, r) => (acc[r['问题归因']] = (acc[r['问题归因']]||0)+1, acc), {})).map(([name,count])=>({name,count}));
      countBars($('issueBars'), issues);
      countBars($('sourceBars'), DATA.sources.slice(0, 8));
      barList($('keywordBars'), summarize(rows, '楼盘/商圈').sort((a,b)=>a.visible-b.visible || a.effectiveContact-b.effectiveContact).slice(0, 8), 'visible');
      renderActions(rows);
      renderDetails(rows);
    }
    function init() {
      $('metaLine').textContent = `检核日期：${DATA.meta.date}｜生成时间：${DATA.meta.generatedAt}`;
      $('footer').textContent = DATA.meta.note;
      fillSelect('date', '全部日期', DATA.meta.dates || uniqueValues('检核日期'));
      $('date').value = DATA.meta.date || '';
      fillSelect('city', '全部城市', uniqueValues('城市'));
      fillSelect('platform', '全部AI平台', uniqueValues('AI平台'));
      fillSelect('type', '全部问题类型', uniqueValues('问题类型'));
      fillSelect('issue', '全部问题归因', uniqueValues('问题归因'));
      ['search','date','city','platform','type','issue'].forEach(id => $(id).addEventListener('input', render));
      document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        quick = btn.dataset.quick;
        render();
      }));
      render();
    }
    init();
  </script>
</body>
</html>
